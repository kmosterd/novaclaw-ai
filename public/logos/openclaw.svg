<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <radialGradient id="oc-body" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e87070"/>
      <stop offset="100%" stop-color="#b03030"/>
    </radialGradient>
    <radialGradient id="oc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc3333" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#cc3333" stop-opacity="0"/>
    </radialGradient>
    <filter id="oc-sf">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="56" height="56" rx="12" fill="#0e0808"/>

  <!-- Red glow halo behind robot -->
  <circle cx="28" cy="27" r="22" fill="url(#oc-glow)" filter="url(#oc-sf)"/>

  <!-- Antenna left -->
  <line x1="22" y1="13" x2="18" y2="6" stroke="#c84040" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="17.5" cy="5" r="2.5" fill="#c84040"/>

  <!-- Antenna right -->
  <line x1="34" y1="13" x2="38" y2="6" stroke="#c84040" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="38.5" cy="5" r="2.5" fill="#c84040"/>

  <!-- Body -->
  <circle cx="28" cy="28" r="15.5" fill="url(#oc-body)"/>

  <!-- Left arm -->
  <ellipse cx="10.5" cy="30" rx="6" ry="3.8" fill="#c04040" transform="rotate(-18 10.5 30)"/>

  <!-- Right arm -->
  <ellipse cx="45.5" cy="30" rx="6" ry="3.8" fill="#c04040" transform="rotate(18 45.5 30)"/>

  <!-- Eyes background -->
  <circle cx="22.5" cy="27.5" r="3.5" fill="#1a0606"/>
  <circle cx="33.5" cy="27.5" r="3.5" fill="#1a0606"/>

  <!-- Eyes cyan glow -->
  <circle cx="22.5" cy="27.5" r="2.2" fill="#3ad0c8"/>
  <circle cx="33.5" cy="27.5" r="2.2" fill="#3ad0c8"/>

  <!-- Eye specular -->
  <circle cx="23.4" cy="26.5" r="0.9" fill="white" opacity="0.75"/>
  <circle cx="34.4" cy="26.5" r="0.9" fill="white" opacity="0.75"/>

  <!-- Left leg -->
  <rect x="20" y="42.5" width="5.5" height="7.5" rx="2.8" fill="#c04040"/>

  <!-- Right leg -->
  <rect x="30.5" y="42.5" width="5.5" height="7.5" rx="2.8" fill="#c04040"/>
</svg>
